name: Build Desktop App

on:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - '.github/workflows/build-desktop.yml'
  pull_request:
    branches: [main]
    paths:
      - 'desktop/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: false
        type: choice
        default: 'mac'
        options:
          - mac
          - win

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: desktop

jobs:
  # ── macOS arm64 ──────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'mac' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build & Package (macOS arm64 dmg)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist:mac -- --publish always

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: Taco-AI-macOS-arm64
          path: desktop/release/*.dmg
          retention-days: 30

  # ── Windows x64 ──────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'win' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build & Package (Windows x64 NSIS)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          Write-Host "Found Visual Studio at: $vsPath"
          $vcvars = "$vsPath\VC\Auxiliary\Build\vcvars64.bat"
          cmd /c "`"$vcvars`" >NUL && npm run dist:win -- --publish always"

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: Taco-AI-Windows-x64
          path: desktop/release/*.exe
          retention-days: 30

