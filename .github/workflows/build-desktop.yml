name: Build Desktop App

on:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - '.github/workflows/build-desktop.yml'
  pull_request:
    branches: [main]
    paths:
      - 'desktop/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: false
        type: choice
        default: 'all'
        options:
          - all
          - mac
          - win
          - linux

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: desktop

jobs:
  # ── macOS arm64 ──────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'mac' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build & Package (macOS arm64 dmg)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist:mac

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: Taco-AI-macOS-arm64
          path: desktop/release/*.dmg
          retention-days: 30

  # ── Windows x64 ──────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'win' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build & Package (Windows x64 NSIS)
        run: npm run dist:win

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: Taco-AI-Windows-x64
          path: desktop/release/*.exe
          retention-days: 30

  # ── Linux x64 ────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3 \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libasound2 \
            libxtst6 \
            xvfb \
            fakeroot \
            dpkg

      - name: Install dependencies
        run: npm ci

      - name: Build & Package (Linux AppImage + deb)
        run: xvfb-run --auto-servernum npm run dist:linux

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: Taco-AI-Linux-x64
          path: |
            desktop/release/*.AppImage
            desktop/release/*.deb
          retention-days: 30
